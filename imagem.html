<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

    </style>
</head>
<body>
    <img src="" id="foto">

    <script>
    const params = new URLSearchParams(window.location.search);
    const img = params.get("img");

    if (img) {
        document.getElementById("foto").src = img;
    }
</script>

</body>
</html>
